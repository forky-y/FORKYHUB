<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForkyHUB | Ultimate Key System</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a;
            --card: #151c2c;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --text: #ffffff;
            --text-dim: #94a3b8;
            --success: #10b981;
            --premium: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container { width: 100%; max-width: 500px; }

        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 35px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            opacity: 0.1;
            pointer-events: none;
        }

        h1 { font-size: 32px; font-weight: 800; margin: 0 0 10px 0; letter-spacing: -1px; }
        .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 30px; }

        /* UI Components */
        .status-pill {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 16px;
            text-align: left;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .status-pill label { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 6px; font-weight: 600; }
        .status-pill b { font-family: monospace; font-size: 14px; color: var(--accent); word-break: break-all; }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 15px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4); }
        .btn:disabled { background: #334155; cursor: not-allowed; transform: none; box-shadow: none; }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: rgba(16, 185, 129, 0.1);
            border: 2px dashed var(--success);
            border-radius: 16px;
            display: none;
            animation: slideUp 0.4s ease;
        }
        .result-box code { display: block; font-family: monospace; font-size: 18px; color: var(--success); margin: 15px 0; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; }

        /* Admin Section */
        #admin-panel { display: none; }
        .input-field {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 10px;
            color: white;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
        }
        .input-field:focus { border-color: var(--accent); }

        .db-container {
            margin-top: 30px;
            max-height: 300px;
            overflow-y: auto;
            text-align: left;
        }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { color: var(--text-dim); padding: 10px; border-bottom: 1px solid #334155; text-align: left; }
        td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        footer { margin-top: 25px; text-align: center; font-size: 12px; color: var(--text-dim); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="client-page" class="card">
        <h1>ForkyHUB</h1>
        <p class="subtitle">Secure Key Management System</p>

        <div class="status-pill">
            <label>Detected Device ID</label>
            <b id="hwid-val">Fetching HWID...</b>
        </div>

        <button id="get-btn" class="btn" onclick="fetchKey()">GENERATE TRIAL KEY</button>

        <div id="key-res" class="result-box">
            <small style="color: var(--text-dim)">Access Key (6 Hours):</small>
            <code id="out-key">FREE-XXXX-XXXX</code>
            <button class="btn" onclick="copy('out-key')" style="padding: 10px; font-size: 12px; background: #334155;">Copy to Clipboard</button>
        </div>
    </div>

    <div id="admin-panel" class="card">
        <h1 style="color: var(--premium)">Admin Control</h1>
        <p class="subtitle">Manage Premium Keys & Database</p>

        <input type="password" id="adm-pass" class="input-field" placeholder="Admin Password">
        <input type="number" id="adm-dur" class="input-field" placeholder="Duration (Hours) - Blank for Permanent">
        
        <button class="btn" style="background: var(--premium);" onclick="genPremium()">GENERATE PREMIUM</button>

        <div id="adm-res" class="result-box" style="border-color: var(--premium); background: rgba(245, 158, 11, 0.1);">
            <code id="out-adm" style="color: var(--premium)"></code>
            <button class="btn" onclick="copy('out-adm')" style="padding: 10px; font-size: 12px; background: #334155;">Copy Key</button>
        </div>

        <div class="db-container">
            <button class="btn" style="background: transparent; border: 1px solid #334155; margin-bottom: 10px;" onclick="listKeys()">REFRESH DATABASE</button>
            <table>
                <thead>
                    <tr><th>Key</th><th>Status/HWID</th></tr>
                </thead>
                <tbody id="db-body">
                    <tr><td colspan="2" style="text-align:center; padding:20px; color:var(--text-dim)">Enter password & refresh to view</td></tr>
                </tbody>
            </table>
        </div>

        <p style="margin-top: 20px;"><a href="#" onclick="location.hash=''; location.reload()" style="color: var(--text-dim); text-decoration: none; font-size: 12px;">← Back to Home</a></p>
    </div>

    <footer>
        &copy; 2026 Create By <b>@agil69</b> &bull; ForkyHUB Solution
    </footer>
</div>

<script>
    // --- GANTI DENGAN URL WORKER KAMU ---
    const API = "https://panel.forkyhub.workers.dev"; 

    // Auto-Routing
    if(window.location.hash === "#admin") {
        document.getElementById('client-page').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
    }

    // Grab HWID
    const hwid = new URLSearchParams(window.location.search).get('hwid');
    if(hwid) {
        document.getElementById('hwid-val').innerText = hwid;
    } else {
        document.getElementById('hwid-val').innerText = "ERROR: HWID NOT FOUND";
        document.getElementById('hwid-val').style.color = "var(--danger)";
        document.getElementById('get-btn').disabled = true;
    }

    // Client: Get Trial
    async function fetchKey() {
        const b = document.getElementById('get-btn');
        b.innerText = "Processing..."; b.disabled = true;
        try {
            const r = await fetch(`${API}/getkey?hwid=${hwid}`);
            const t = await r.text();
            document.getElementById('out-key').innerText = t;
            document.getElementById('key-res').style.display = 'block';
            b.innerText = "Key Generated!";
        } catch { 
            alert("API Error!"); b.innerText = "Try Again"; b.disabled = false;
        }
    }

    // Admin: Gen Premium
    async function genPremium() {
        const pass = document.getElementById('adm-pass').value;
        const dur = document.getElementById('adm-dur').value;
        try {
            const r = await fetch(`${API}/admin/generate`, {
                method: 'POST',
                body: JSON.stringify({adminPassword: pass, durationType: dur ? 'custom' : 'permanent', customHours: dur})
            });
            if(r.status === 401) return alert("Wrong Password!");
            const d = await r.json();
            document.getElementById('out-adm').innerText = d.key;
            document.getElementById('adm-res').style.display = 'block';
        } catch { alert("Error!"); }
    }

    // Admin: List Data
    async function listKeys() {
        const pass = document.getElementById('adm-pass').value;
        const body = document.getElementById('db-body');
        body.innerHTML = '<tr><td colspan="2" style="text-align:center">Loading...</td></tr>';
        try {
            const r = await fetch(`${API}/admin/list`, {
                method: 'POST',
                body: JSON.stringify({adminPassword: pass})
            });
            const d = await r.json();
            body.innerHTML = d.map(i => `
                <tr>
                    <td style="color:var(--success)">${i.keyName}</td>
                    <td style="color:${i.hwid==='EMPTY'?'#64748b':'#3b82f6'}">${i.hwid}</td>
                </tr>
            `).join('');
        } catch { alert("Failed to fetch list. Check password!"); }
    }

    function copy(id) {
        navigator.clipboard.writeText(document.getElementById(id).innerText);
        alert("Copied!");
    }
</script>

</body>
</html>
