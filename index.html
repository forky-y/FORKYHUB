<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForkyHUB | Ultra Key System</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0f1a; --card: #151c2c; --accent: #3b82f6; --text: #ffffff; --text-dim: #94a3b8; --success: #10b981; --premium: #f59e0b; --danger: #ef4444; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 500px; }
        .card { background: var(--card); border-radius: 24px; padding: 30px; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        h1 { font-size: 28px; font-weight: 800; margin: 0 0 10px 0; }
        .status-pill { background: rgba(0, 0, 0, 0.2); padding: 15px; border-radius: 16px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.05); text-align: left; }
        .btn { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; width: 100%; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        .btn:disabled { background: #334155; opacity: 0.6; cursor: not-allowed; }
        .input-field { width: 100%; background: #0b0f1a; border: 1px solid #334155; padding: 12px; border-radius: 10px; color: white; margin-bottom: 10px; box-sizing: border-box; }
        .result-box { margin-top: 20px; padding: 15px; background: rgba(16, 185, 129, 0.1); border: 1px dashed var(--success); border-radius: 12px; display: none; }
        code { display: block; background: #000; padding: 10px; border-radius: 8px; color: var(--success); margin: 10px 0; word-break: break-all; }
        table { width: 100%; font-size: 11px; margin-top: 15px; border-collapse: collapse; }
        th { text-align: left; color: var(--text-dim); padding-bottom: 10px; }
        td { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div class="container">
    <div id="client-page" class="card">
        <h1>ForkyHUB</h1>
        <p style="color: var(--text-dim); font-size: 13px;">Dapatkan akses script melalui tombol di bawah.</p>
        <div class="status-pill">
            <label style="font-size: 10px; color: var(--text-dim);">DEVICE HWID:</label><br>
            <b id="hwid-display">Mengecek HWID...</b>
        </div>
        <button id="get-key-btn" class="btn" onclick="requestKey()">AMBIL TRIAL KEY</button>
        <div id="res-key" class="result-box">
            <code></code>
            <button class="btn" style="background:#334155; font-size:12px;" onclick="copyKey()">SALIN KEY</button>
        </div>
    </div>

    <div id="admin-page" class="card" style="display:none;">
        <h1 style="color: var(--premium);">Admin Panel</h1>
        <input type="password" id="adm-pass" class="input-field" placeholder="Admin Password">
        <input type="number" id="adm-dur" class="input-field" placeholder="Durasi (Jam)">
        <button class="btn" style="background: var(--premium);" onclick="genPremium()">GENERATE PREMIUM</button>
        <button class="btn" style="background: transparent; border: 1px solid #334155;" onclick="loadDB()">REFRESH DATABASE</button>
        
        <div style="overflow-y: auto; max-height: 200px;">
            <table>
                <thead><tr><th>KEY</th><th>STATUS</th><th>X</th></tr></thead>
                <tbody id="db-body"></tbody>
            </table>
        </div>
        <p><a href="#" onclick="location.hash=''; location.reload();" style="color: var(--text-dim); font-size: 12px;">Kembali</a></p>
    </div>
</div>

<script>
    // --- 1. SETTING URL API ---
    // Pastikan link ini mirip dengan link yang kamu buka di browser (tanpa garis miring di akhir)
    const API = "https://panel.forkyhub.workers.dev"; 

    // --- 2. DETEKSI HWID ---
    const urlParams = new URLSearchParams(window.location.search);
    const myHwid = urlParams.get('hwid');

    if (window.location.hash === "#admin") {
        document.getElementById('client-page').style.display = 'none';
        document.getElementById('admin-page').style.display = 'block';
    }

    if (myHwid) {
        document.getElementById('hwid-display').innerText = myHwid;
    } else {
        document.getElementById('hwid-display').innerText = "TIDAK ADA HWID (Buka dari Roblox)";
        document.getElementById('hwid-display').style.color = "var(--danger)";
        document.getElementById('get-key-btn').disabled = true;
    }

    // --- 3. FUNGSI UTAMA ---
    async function requestKey() {
        const btn = document.getElementById('get-key-btn');
        btn.innerText = "Tunggu..."; btn.disabled = true;

        try {
            console.log("Mengirim request ke:", `${API}/getkey?hwid=${myHwid}`);
            const res = await fetch(`${API}/getkey?hwid=${myHwid}`);
            const text = await res.text();

            if (!res.ok) throw new Error(text);

            document.querySelector('#res-key code').innerText = text;
            document.getElementById('res-key').style.display = 'block';
            btn.innerText = "Berhasil!";
        } catch (err) {
            console.error(err);
            alert("Gagal ambil key: " + err.message);
            btn.innerText = "Coba Lagi"; btn.disabled = false;
        }
    }

    async function genPremium() {
        const pass = document.getElementById('adm-pass').value;
        const dur = document.getElementById('adm-dur').value;
        if(!pass) return alert("Password kosong!");

        try {
            const res = await fetch(`${API}/admin/generate`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({adminPassword: pass, durationType: dur ? 'custom' : 'permanent', customHours: dur})
            });
            if (res.status === 401) return alert("Password Admin Salah!");
            const data = await res.json();
            alert("Key Premium: " + data.key);
            loadDB();
        } catch (err) { alert("Error: " + err.message); }
    }

    async function loadDB() {
        const pass = document.getElementById('adm-pass').value;
        const body = document.getElementById('db-body');
        body.innerHTML = "<tr><td colspan='3'>Memuat...</td></tr>";

        try {
            const res = await fetch(`${API}/admin/list`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({adminPassword: pass})
            });
            const data = await res.json();
            body.innerHTML = data.map(i => `
                <tr>
                    <td>${i.key}</td>
                    <td>${i.hwid === 'EMPTY' ? 'Kosong' : 'Locked'}</td>
                    <td><button onclick="delKey('${i.key}')">🗑️</button></td>
                </tr>
            `).join('');
        } catch (err) { body.innerHTML = "Error memuat data."; }
    }

    async function delKey(k) {
        if(!confirm("Hapus?")) return;
        const pass = document.getElementById('adm-pass').value;
        await fetch(`${API}/admin/delete`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({adminPassword: pass, key: k})
        });
        loadDB();
    }

    function copyKey() {
        const text = document.querySelector('#res-key code').innerText;
        navigator.clipboard.writeText(text);
        alert("Key berhasil disalin!");
    }
</script>
</body>
</html>
