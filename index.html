<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForkyHUB | Key System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --premium: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease;
        }

        h1 { font-size: 28px; margin-bottom: 5px; font-weight: 800; }
        .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 25px; }

        /* Status Box */
        .status-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            border-left: 5px solid var(--accent);
            text-align: left;
        }
        .status-box span { display: block; color: var(--text-dim); margin-bottom: 5px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .status-box b { color: var(--text-main); font-family: monospace; word-break: break-all; font-size: 14px; }

        /* Buttons */
        .btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 16px;
            margin-top: 10px;
        }
        .btn:hover { background-color: var(--accent-hover); transform: translateY(-2px); }
        .btn:disabled { background-color: #475569; cursor: not-allowed; transform: none; }

        /* Result Section */
        .result-area {
            margin-top: 25px;
            padding: 20px;
            background: rgba(34, 197, 94, 0.1);
            border: 2px dashed var(--success);
            border-radius: 12px;
            display: none;
            animation: fadeIn 0.5s ease;
        }
        .result-area code {
            display: block;
            background: #000;
            padding: 12px;
            margin: 15px 0;
            color: var(--success);
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px;
            border-radius: 8px;
        }

        /* Admin UI */
        #admin-panel { display: none; }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 12px; color: var(--text-dim); }
        .admin-input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            outline: none;
            box-sizing: border-box;
        }
        .admin-input:focus { border-color: var(--premium); }
        .btn-premium { background-color: var(--premium); }
        .btn-premium:hover { background-color: #d97706; }

        footer { margin-top: 25px; font-size: 11px; color: var(--text-dim); text-align: center; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="get-key-page" class="card">
        <h1>ForkyHUB</h1>
        <p class="subtitle">Sistem Key Otomatis untuk Roblox</p>
        
        <div class="status-box">
            <span>HWID ANDA (OTOMATIS):</span>
            <b id="hwid-display">Loading HWID...</b>
        </div>

        <button id="main-btn" class="btn" onclick="requestKey()">AMBIL TRIAL KEY (6 JAM)</button>

        <div id="result-box" class="result-area">
            <small>Key Berhasil Dibuat!</small>
            <code id="key-display">ForkyHUB-FREE-XXXX</code>
            <button class="btn" onclick="copyToClipboard()" style="padding: 8px; font-size: 12px; background: #334155;">Salin Key</button>
        </div>
    </div>

    <div id="admin-panel" class="card">
        <h1 style="color: var(--premium)">Admin Panel</h1>
        <p class="subtitle">Buat Key Premium / Permanent</p>
        
        <div class="input-group">
            <label>Admin Password</label>
            <input type="password" id="admin-pass" class="admin-input" placeholder="Masukkan password...">
        </div>

        <div class="input-group">
            <label>Durasi (Dalam Jam)</label>
            <input type="number" id="admin-duration" class="admin-input" placeholder="Contoh: 24 (Kosongkan jika Permanen)">
        </div>

        <button class="btn btn-premium" onclick="generatePremium()">BUAT KEY PREMIUM</button>

        <div id="admin-result" class="result-area" style="border-color: var(--premium); background: rgba(245, 158, 11, 0.1);">
            <small style="color: var(--premium)">Premium Key:</small>
            <code id="premium-key-display" style="color: var(--premium)"></code>
        </div>
        
        <p style="margin-top: 20px;"><a href="#" onclick="goHome()" style="color: var(--text-dim); font-size: 12px; text-decoration: none;">← Kembali</a></p>
    </div>

    <footer>
        Created by @agil69 &bull; ForkyHUB Script Solution
    </footer>
</div>

<script>
    // --- GANTI URL INI DENGAN LINK CLOUDFLARE WORKER KAMU ---
    const WORKER_URL = "https://panel.forkyhub.workers.dev";

    // 1. Ambil HWID dari URL (/?hwid=...)
    const params = new URLSearchParams(window.location.search);
    const userHwid = params.get('hwid');

    if (userHwid) {
        document.getElementById('hwid-display').innerText = userHwid;
    } else {
        document.getElementById('hwid-display').innerText = "HWID TIDAK DITEMUKAN!";
        document.getElementById('hwid-display').style.color = "var(--danger)";
        document.getElementById('main-btn').disabled = true;
        document.getElementById('main-btn').innerText = "Buka Lewat Script Roblox";
    }

    // 2. Fungsi Ambil Key Trial
    async function requestKey() {
        const btn = document.getElementById('main-btn');
        btn.innerText = "Processing...";
        btn.disabled = true;

        try {
            const res = await fetch(`${WORKER_URL}/getkey?hwid=${userHwid}`);
            const text = await res.text();
            
            document.getElementById('key-display').innerText = text;
            document.getElementById('result-box').style.display = 'block';
            btn.innerText = "Key Diterima!";
        } catch (e) {
            alert("Error: Gagal terhubung ke Backend!");
            btn.innerText = "Coba Lagi";
            btn.disabled = false;
        }
    }

    // 3. Fungsi Buat Premium (Admin)
    async function generatePremium() {
        const pass = document.getElementById('admin-pass').value;
        const hours = document.getElementById('admin-duration').value;

        if(!pass) return alert("Password wajib diisi!");

        try {
            const res = await fetch(`${WORKER_URL}/admin/generate`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    adminPassword: pass,
                    durationType: hours ? "custom" : "permanent",
                    customHours: parseInt(hours)
                })
            });

            if(res.status === 401) return alert("Password Admin Salah!");
            
            const data = await res.json();
            document.getElementById('premium-key-display').innerText = data.key;
            document.getElementById('admin-result').style.display = 'block';
        } catch (e) {
            alert("Terjadi kesalahan sistem!");
        }
    }

    // 4. Salin Key
    function copyToClipboard() {
        const key = document.getElementById('key-display').innerText;
        navigator.clipboard.writeText(key);
        alert("Key berhasil disalin ke clipboard!");
    }

    // 5. Routing Admin (Simple)
    if(window.location.hash === "#admin") {
        document.getElementById('get-key-page').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
    }

    function goHome() {
        window.location.hash = "";
        location.reload();
    }
</script>

</body>
</html>
