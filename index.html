<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔑 ForkyHUB v3.0 - Key System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1>🔑 <span class="brand">ForkyHUB</span> v3.0</h1>
            <p>🤖 Auto HWID Detection • Real Roblox HWID • Time-Based Keys</p>
        </div>

        <!-- TABS -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('user')">
                <span>👤</span> User Panel
            </button>
            <button class="tab-btn" onclick="showTab('admin')">
                <span>⚙️</span> Admin Panel
            </button>
        </div>

        <!-- USER PANEL -->
        <div id="user" class="tab-content active">
            <div class="card">
                <h2>🤖 Auto Detect HWID & Verify Key</h2>
                
                <!-- HWID DETECTION GRID -->
                <div class="hwid-grid">
                    <button class="btn btn-primary" onclick="detectCanvasHWID()">
                        <span>🖌️</span> Canvas Fingerprint
                    </button>
                    <button class="btn btn-success" onclick="detectWebGLHWID()">
                        <span>🎮</span> WebGL + GPU
                    </button>
                    <button class="btn btn-secondary" onclick="detectFullHWID()">
                        <span>🔍</span> Full System
                    </button>
                    <button class="btn btn-danger" onclick="detectRobloxHWID()">
                        <span>🟦</span> Roblox Style
                    </button>
                </div>

                <div class="input-group">
                    <label>🖥️ <span id="hwidLabel">Click Detect</span> HWID:</label>
                    <input type="text" id="userHwid" readonly class="hwid-input">
                    <small>Copy untuk Roblox executor</small>
                </div>

                <div class="input-group">
                    <label>🔑 Key:</label>
                    <input type="text" id="userKey" placeholder="ForkyHUB-XXXXXXX">
                </div>

                <div class="btn-row">
                    <button class="btn btn-primary" onclick="verifyUserKey()">✅ Auto Verify</button>
                    <button class="btn btn-success" onclick="getRobloxScript()">📜 Get Script</button>
                </div>

                <div id="userStatus" class="status"></div>
                <div id="activatedKey" class="result-box"></div>
            </div>
        </div>

        <!-- ADMIN PANEL -->
        <div id="admin" class="tab-content">
            <div class="card">
                <h2>🎁 Generate Time-Based Keys</h2>
                <div class="form-row">
                    <div class="input-group">
                        <label>📦 Key Type:</label>
                        <select id="keyType">
                            <option value="trial-6h">Trial (6 Jam)</option>
                            <option value="trial-24h">Trial (1 Hari)</option>
                            <option value="basic-3d">Basic (3 Hari)</option>
                            <option value="premium-7d">Premium (7 Hari)</option>
                            <option value="vip-30d">VIP (30 Hari)</option>
                            <option value="custom">🎨 Custom Days</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>🔢 Amount:</label>
                        <input type="number" id="keyAmount" value="1" min="1" max="100">
                    </div>
                </div>
                <div class="input-group custom-days" id="customDaysGroup" style="display:none;">
                    <label>📅 Custom Days:</label>
                    <input type="number" id="customDays" value="7" min="1" max="365">
                </div>
                <button class="btn btn-success btn-large" onclick="generateKeys()">✨ Generate Keys</button>
                <div id="adminStatus" class="status"></div>
                <div id="generatedKeys"></div>
            </div>

            <div class="card">
                <h2>📋 Key Manager</h2>
                <div class="input-group">
                    <input type="text" id="searchKey" placeholder="🔍 Search keys..." onkeyup="filterKeys()">
                </div>
                <div id="keyList" class="key-grid"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
